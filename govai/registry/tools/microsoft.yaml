- name: "Microsoft 365 Copilot"
  vendor: "Microsoft"
  aliases:
    - "M365 Copilot"
    - "Office Copilot"
    - "Microsoft Copilot"
    - "Copilot for Microsoft 365"
  risk_tier: "LIMITED"
  ai_features:
    - "Document drafting and summarisation"
    - "Email composition suggestions"
    - "Presentation generation from prompts"
    - "Meeting transcript summarisation"
    - "Data analysis in Excel via natural language"
  decision_scope: "Generates content suggestions; human reviews and approves all output before use."
  data_categories:
    - "Business documents and emails"
    - "Meeting transcripts"
    - "Spreadsheet data"
    - "Presentation content"
  obligations:
    - "Transparency: disclose AI-generated content to recipients"
    - "Mark AI-generated or AI-assisted content where applicable"
  missing_docs_template:
    - "AI usage disclosure policy for outbound communications"
    - "Internal guidelines on reviewing AI-generated content"
  source_url: "https://www.microsoft.com/en-us/microsoft-365/copilot"
  last_verified: "2026-01"
  notes: >
    Risk tier is LIMITED because Copilot generates content that a human
    reviews before sending. If configured to send content autonomously
    (e.g. auto-reply), risk may increase to HIGH.

