    - "Case routing algorithm documentation"
  source_url: "https://www.salesforce.com/products/einstein/features/"
  last_verified: "2026-01"
  notes: >
    LIMITED when used for case categorisation with human agent review.
    If configured to autonomously resolve cases or determine service
    access levels, risk may increase to HIGH.

